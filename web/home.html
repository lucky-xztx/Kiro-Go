<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiro-Go</title>
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico" />
  <link rel="stylesheet" href="/admin/home.css" id="__homeCss" />
  <script>
    (function () {
      var v = Date.now();
      window.__v = v;
      var css = document.getElementById('__homeCss');
      if (css) css.href = '/admin/home.css?v=' + v;
    })();
  </script>
</head>

<body>
  <div class="copied-toast" id="toast">已复制到剪贴板</div>

  <!-- 顶部用户栏 -->
  <div class="top-bar">
    <div class="top-bar-inner" id="topBar">
      <div class="auth-actions" id="authActions">
        <button type="button" class="btn-ghost" id="loginBtn">登录</button>
        <button type="button" class="btn-pill" id="registerBtn">注册</button>
      </div>
    </div>
  </div>

  <div class="container">
    <h1 id="serverName">Kiro-Go</h1>
    <p class="subtitle">Claude / OpenAI 双协议兼容的 Kiro API 中转服务</p>

    <a class="hero-link" href="/admin" target="_self" id="adminEntry" hidden>
      <span>进入管理面板</span>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 5l7 7-7 7" />
      </svg>
    </a>

    <section class="card">
      <h2>接入信息</h2>
      <div class="info-row">
        <span class="info-label">Claude</span>
        <div class="info-value" id="claudeUrl" data-copy>-</div>
      </div>
      <div class="info-row">
        <span class="info-label">OpenAI</span>
        <div class="info-value" id="openaiUrl" data-copy>-</div>
      </div>
      <div class="info-row">
        <span class="info-label">Models</span>
        <div class="info-value" id="modelsUrl" data-copy>-</div>
      </div>
      <div class="info-row info-row-top">
        <span class="info-label">模型</span>
        <div class="models-list" id="modelsList">
          <span class="no-models">加载中...</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>服务状态</h2>
      <div class="status-grid">
        <div class="stat-item">
          <div class="stat-value" id="uptime">-</div>
          <div class="stat-label">运行时间</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="modelCount">-</div>
          <div class="stat-label">可用模型</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="successRate">-</div>
          <div class="stat-label">成功率</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalCalls">-</div>
          <div class="stat-label">调用次数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalTokens">-</div>
          <div class="stat-label">已用 Token</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="accountsCount">-</div>
          <div class="stat-label">在线账号</div>
        </div>
      </div>
    </section>

    <section class="card keys-card" id="keysCard" hidden>
      <div class="logs-head">
        <h2>我的密钥</h2>
        <button type="button" class="btn-pill keys-new-btn" id="newKeyBtn">+ 新建</button>
      </div>
      <div class="keys-list" id="keysList">
        <div class="keys-empty">加载中...</div>
      </div>
    </section>

    <section class="card logs-card" id="logsCard">
      <div class="logs-head">
        <h2>调用明细</h2>
        <div class="logs-pills">
          <span class="rate-pill pill-rpm">RPM <strong id="logsRpm">0</strong></span>
          <span class="rate-pill pill-tpm">TPM <strong id="logsTpm">0</strong></span>
        </div>
      </div>
      <div class="logs-scroll">
        <table class="logs-table">
          <thead>
            <tr>
              <th>时间</th>
              <th>令牌</th>
              <th>模型</th>
              <th>用时</th>
              <th>输入</th>
              <th>输出</th>
              <th>详情</th>
            </tr>
          </thead>
          <tbody id="logsBody">
            <tr class="logs-empty"><td colspan="7">请先登录查看调用明细</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="logsPagination"></div>
    </section>

    <footer class="footer">
      <span>Powered by Kiro-Go</span>
      <span class="dot">·</span>
      <span id="versionTag">v-</span>
      <span class="dot">·</span>
      <a href="https://github.com/Quorinex/Kiro-Go" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>

  <!-- 登录 / 注册 弹窗 -->
  <div class="auth-overlay" id="authOverlay" hidden>
    <div class="auth-card" role="dialog" aria-modal="true">
      <div class="auth-tabs">
        <button type="button" class="auth-tab is-active" data-mode="login">登录</button>
        <button type="button" class="auth-tab" data-mode="register">注册</button>
        <button type="button" class="auth-close" id="authClose" aria-label="关闭">×</button>
      </div>
      <form id="authForm" class="auth-form" autocomplete="off">
        <label>
          <span>用户名</span>
          <input type="text" name="username" required minlength="3" maxlength="32"
            placeholder="字母 / 数字，3-32 位" />
        </label>
        <!-- <label data-only="register" hidden>
          <span>邮箱（可选）</span>
          <input type="email" name="email" placeholder="you@example.com" />
        </label> -->
        <label>
          <span>密码</span>
          <input type="password" name="password" required minlength="6"
            placeholder="不少于 6 位" />
        </label>
        <p class="auth-error" id="authError"></p>
        <button type="submit" class="btn-pill auth-submit" id="authSubmit">登录</button>
      </form>
    </div>
  </div>

  <script src="/admin/home.js?v=__V__"></script>
  <script>
    (function () {
      var s = document.querySelector('script[src^="/admin/home.js"]');
      if (s) s.src = '/admin/home.js?v=' + (window.__v || Date.now());
    })();
  </script>
</body>

</html>
